<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Text Reader</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>AI Text Reader</h1>
    <div class="header-right">
      <div class="tab-bar" id="tabBar">
        <button class="tab active" id="tabText" onclick="showPane('text')">Text</button>
        <button class="tab" id="tabCondensed" onclick="showPane('condensed')">Condensed</button>
        <button class="tab" id="tabSimplified" onclick="showPane('simplified')">Simplified</button>
      </div>
    </div>
  </header>

  <main class="app" id="app">
    <!-- Left pane: reader input -->
    <section class="pane pane-text active" id="paneText">
      <div class="pane-header">
        <span class="pane-title">Your Text</span>
        <div class="pane-actions">
          <button class="btn-clear" id="clearBtn" onclick="clearText()">Clear</button>
          <button class="btn-clarify" id="clarifyBtn" onclick="clarify()">
            ✨ Process with AI
          </button>
        </div>
      </div>
      <textarea
        id="textInput"
        placeholder="Paste your complex text here…"
        spellcheck="true"
        aria-label="Text to clarify"
      ></textarea>
    </section>

    <div class="divider"></div>

    <!-- Right pane: AI output -->
    <section class="pane pane-ai" id="paneAI">
      <div class="pane-header">
        <div class="mode-selector">
          <button class="mode-btn active" id="modeCondensed" onclick="setMode('condensed')">Condensed</button>
          <button class="mode-btn" id="modeSimplified" onclick="setMode('simplified')">Simplified</button>
        </div>
        <span class="cache-badge hidden" id="cacheBadge">⚡ Cached</span>
      </div>
      <div class="ai-content" id="aiContent">
        <div class="placeholder">
          <p>Paste some text on the left and click <strong>Process with AI</strong> to condense it.</p>
        </div>
      </div>
      <div class="loading hidden" id="loading">
        <div class="spinner"></div>
        <p id="loadingText">Condensing…</p>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
