<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Text Reader</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>AI Text Reader</h1>
    <!-- Mobile tab bar -->
    <div class="tab-bar" id="tabBar">
      <button class="tab active" id="tabText" onclick="showPane('text')">Text</button>
      <button class="tab" id="tabAI" onclick="showPane('ai')">AI View</button>
    </div>
  </header>

  <main class="app" id="app">
    <!-- Left pane: reader input -->
    <section class="pane pane-text active" id="paneText">
      <div class="pane-header">
        <span class="pane-title">Your Text</span>
        <button class="btn-clarify" id="clarifyBtn" onclick="clarify()">
          ✨ Clarify with AI
        </button>
      </div>
      <textarea
        id="textInput"
        placeholder="Paste your complex text here…"
        spellcheck="true"
        aria-label="Text to clarify"
      ></textarea>
    </section>

    <div class="divider"></div>

    <!-- Right pane: AI clarification -->
    <section class="pane pane-ai" id="paneAI">
      <div class="pane-header">
        <span class="pane-title">AI Clarification</span>
        <span class="cache-badge hidden" id="cacheBadge">⚡ Cached</span>
      </div>
      <div class="ai-content" id="aiContent">
        <div class="placeholder">
          <p>Paste some text on the left and click <strong>Clarify with AI</strong> to get a simplified explanation.</p>
        </div>
      </div>
      <div class="loading hidden" id="loading">
        <div class="spinner"></div>
        <p>Clarifying…</p>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
