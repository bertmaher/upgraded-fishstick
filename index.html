<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Text Reader</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>AI Text Reader</h1>
    <div class="header-right">
      <div class="samples-container" id="samplesContainer">
        <button class="btn-samples" id="samplesBtn" onclick="toggleSamples()">Samples ▾</button>
        <div class="samples-menu hidden" id="samplesMenu"></div>
      </div>
      <button class="btn-clear" id="clearBtn" onclick="clearText()">Clear</button>
      <div class="mode-selector" id="modeSelector">
        <button class="mode-btn active" id="modeCondensed" onclick="setMode('condensed')">Reader's Digest</button>
        <button class="mode-btn" id="modeSimplified" onclick="setMode('simplified')">CliffsNotes</button>
      </div>
      <div class="tab-bar" id="tabBar">
        <button class="tab active" id="tabText" onclick="showPane('text')">Original</button>
        <button class="tab" id="tabCondensed" onclick="showPane('condensed')">Reader's Digest</button>
        <button class="tab" id="tabSimplified" onclick="showPane('simplified')">CliffsNotes</button>
      </div>
    </div>
  </header>

  <main class="app" id="app">
    <!-- Left pane: reader input -->
    <section class="pane pane-text active" id="paneText">
      <textarea
        id="textInput"
        placeholder="Paste your complex text here…"
        spellcheck="true"
        aria-label="Text to clarify"
      ></textarea>
    </section>

    <div class="divider"></div>

    <!-- Right pane: AI output -->
    <section class="pane pane-ai" id="paneAI">
      <div class="pane-header pane-header-ai">
        <span class="cache-badge hidden" id="cacheBadge">⚡ Cached</span>
      </div>
      <div class="ai-content" id="aiContent">
        <div class="placeholder">
          <p>Switch to <strong>Reader's Digest</strong> or <strong>CliffsNotes</strong> to process your text.</p>
        </div>
      </div>
      <div class="loading hidden" id="loading">
        <div class="spinner"></div>
        <p id="loadingText">Condensing…</p>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
